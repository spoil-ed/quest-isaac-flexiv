# Dual-arm pick/place scene consumed by dual_follow_with_studio.py.
# Runtime serial aliases must still be supplied with CLI options.

task:
  name: "pick_place_redblock_flexiv_dual"
  source_task: "../../../../../unitree/unitree_sim_isaaclab/tasks/g1_tasks/pick_place_redblock_g1_29dof_dex1"
  description: "Wall-mounted dual Flexiv arms over a tabletop with one red block"
  fake_trajectory_profile: "pick_place_redblock_dual"

robots:
  - side: "left"
    serial_number: "Rizon4-VIHhZM"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/LeftRizon4"
    name: "LeftRizon4"
    end_effector_prim_name: "flange"
    usd: "../../../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: 0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    # Safe Studio/SimPlugin handshake posture. initial_q is reached afterward
    # through a rate-limited Cartesian target trajectory.
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    # Task-tuned ready posture; DRDK reaches it through NRT joint position.
    initial_q_waypoints:
      - [-1.8879, 1.7997, 0.5862, 1.9189, 2.1874, 1.8322, -0.1244]
    initial_q: [-2.76749928, 1.60589571, -0.10185033, 2.13409496, 2.94157208, 1.03397210, -0.20519636]
    target:
      prim_path: "/World/TargetFrameLeft"
      name: "target_frame_left"
      position: {x: 0.75348038, y: 0.20, z: 0.98000}
      euler_deg: {x: 0.0, y: 90.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 57680}

  - side: "right"
    serial_number: "Rizon4-WE7ssd"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/RightRizon4"
    name: "RightRizon4"
    end_effector_prim_name: "flange"
    usd: "../../../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: -0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    # Task-tuned ready posture; DRDK reaches it through NRT joint position.
    initial_q_waypoints:
      - [-1.18, -1.7187, -0.6799, -1.7503, -0.1607, 1.9371, -0.0858]
    initial_q: [-0.77857750, -1.41308403, -0.30362110, -1.84063396, -0.63279176, 1.04804090, 1.39382554]
    target:
      prim_path: "/World/TargetFrameRight"
      name: "target_frame_right"
      position: {x: 0.75348038, y: -0.20, z: 0.98000}
      euler_deg: {x: 0.0, y: 90.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 57681}

cameras:
  - name: "cam_front"
    resolution: [640, 480]
    fps: 30
    focal_length: 2.0
    position: {x: -0.15, y: 0.0, z: 2.75}
    look_at: {x: 0.50, y: 0.0, z: 0.45}
    up: {x: 1.0, y: 0.0, z: 0.0}

scene_objects:
  - name: "work_table_top"
    type: "cuboid"
    prim_path: "/World/Stage3/WorkTableTop"
    # Long table lowered to keep the bootstrap-to-initq trajectory collision-free.
    position: {x: 0.50, y: 0.0, z: 0.13}
    size: [0.74, 1.90, 0.06]
    color: [0.18, 0.18, 0.17]
    collision: true
    rigid_body: false
    # Soft, non-bouncing contact spreads impact over time to reduce joint-torque spikes.
    physics_material:
      static_friction: 0.6
      dynamic_friction: 0.5
      restitution: 0.0
      compliant_contact:
        stiffness: 20000.0
        damping: 250.0
        acceleration_spring: false
  - name: "red_block"
    type: "cuboid"
    prim_path: "/World/Stage3/RedBlock"
    position: {x: 0.48, y: 0.12, z: 0.205}
    size: [0.06, 0.06, 0.06]
    color: [1.0, 0.0, 0.0]
    mass: 1.0
    collision: true
    rigid_body: true
  - name: "place_pad"
    type: "cuboid"
    prim_path: "/World/Stage3/PlacePad"
    position: {x: 0.62, y: -0.32, z: 0.175}
    size: [0.18, 0.18, 0.02]
    color: [0.08, 0.22, 0.75]
    collision: false
    rigid_body: false
