# Unified host-right + Docker-left dual-arm collection pipeline.
# Select another task with the validation runner's --scene-config option; task
# geometry and robot initialization belong in configs/scenes, not here.

environment_config: "../environments/local_flexiv_runtime.yaml"
scene_config: "../scenes/pick_place_redblock_flexiv_dual.yaml"

gateway:
  sample_endpoint: "tcp://127.0.0.1:5790"
  bridge_endpoint: "tcp://127.0.0.1:5791"
  fps: 30
  jpeg_quality: 90
  camera_keys: ["color_0"]

quest_target: {host: "127.0.0.1", port: 57679}
target_pose:
  left: {host: "127.0.0.1", port: 57680}
  right: {host: "127.0.0.1", port: 57681}
rdk_status:
  left: {host: "127.0.0.1", port: 57682}
  right: {host: "127.0.0.1", port: 57683}

record:
  task_name: "pick_place_redblock_dual"
  fps: 30
  image_size: "640x480"
  max_frames: 240
  task_goal: "Dual-arm Quest teleoperation data collection"
  task_desc: "Host-right and Docker-left Flexiv collection in Isaac Sim"

control:
  physics_hz: 2000
  render_hz: 30
  gpu_dynamics: false
  quest_position_scale: 1.0
  quest_position_deadband_m: 0.0
  quest_relative_orientation_mode: "relative"
  max_linear_speed_m_s: 1.0
  max_angular_speed_rad_s: 0.75
  isaac_max_frames: 900
  target_pose_publish_hz: 30
  target_axis_length: 0.30
  target_axis_radius: 0.010
  rdk_clear_fault: false
  rdk_strict_clear_fault: true

convert:
  repo_id: "qiming/isaacsim_flexiv_dual_arm"
  action_mode: "qpos"

validation:
  run_name_prefix: "isaacsim_flexiv_dual_arm"
  probe_timeout_sec: 300
  min_left_q_delta: 0.005
  min_right_q_delta: 0.005
  min_left_torque_norm: 1e-8
  min_right_torque_norm: 1e-8
  min_left_target_frame_delta: 0.01
  min_right_target_frame_delta: 0.01
  min_servo_cycle_delta: 5
  expected_video_fps: 30
  frame_diff_threshold: 0.2
  max_duplicate_frame_ratio: 0.50
  min_mean_frame_diff: 0.03

fake_sender:
  host: "127.0.0.1"
  dual: true
  trajectory_profile: "pick_place_redblock_dual"
  restart_before_record: true
  restart_warmup_sec: 1.0
  amplitude_m: 0.040
  cycles: 12
  frames: 12000
  rate_hz: 30
  quat_wxyz: "1.0,0.0,0.0,0.0"
