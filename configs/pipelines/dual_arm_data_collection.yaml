# Unified host-right + Docker-left dual-arm collection pipeline.
# Select another task with the validation runner's --scene-config option; task
# geometry and robot initialization belong in configs/scenes, not here.

environment_config: "../environments/local_flexiv_runtime.yaml"
scene_config: "../scenes/pick_place_redblock_flexiv_dual.yaml"

gateway:
  sample_endpoint: "tcp://127.0.0.1:5790"
  bridge_endpoint: "tcp://127.0.0.1:5791"
  fps: 30
  jpeg_quality: 90
  camera_keys: ["color_0"]

quest_target: {host: "127.0.0.1", port: 57679}
target_pose:
  left: {host: "127.0.0.1", port: 57680}
  right: {host: "127.0.0.1", port: 57681}
rdk_status:
  left: {host: "127.0.0.1", port: 57682}
  right: {host: "127.0.0.1", port: 57683}

record:
  task_name: "pick_place_redblock_dual"
  fps: 30
  image_size: "640x480"
  max_frames: 240
  task_goal: "Dual-arm Quest teleoperation data collection"
  task_desc: "Host-right and Docker-left Flexiv collection in Isaac Sim"

control:
  physics_hz: 2000
  render_hz: 30
  gpu_dynamics: false
  # Isaac articulation limits [Nm], matching the existing Studio simulated
  # Rizon4 safety-function limits. The 72% guard below leaves impact headroom.
  joint_effort_limits_nm: [150.0, 150.0, 80.0, 80.0, 49.0, 49.0, 49.0]
  quest_position_scale: 1.0
  quest_position_deadband_m: 0.0
  quest_relative_orientation_mode: "relative"
  # Shared Isaac limiter and DRDK NRT trajectory limits. Reset uses a separate
  # joint-space profile so it does not inherit the former 0.2 rad/s crawl.
  # Match the normal-mode TCP safety limits loaded by both Studios.
  max_linear_speed_m_s: 3.0
  max_angular_speed_rad_s: 12.0
  max_linear_acc_m_s2: 8.0
  max_angular_acc_rad_s2: 30.0
  # The joint command currently applies one common scalar. 2.0944 rad/s is
  # the slowest J1/J2 dq_max in both generated Rizon4 models.
  initial_joint_max_vel_rad_s: 2.0944
  initial_joint_max_acc_rad_s2: 2.0
  reset_joint_max_vel_rad_s: 2.0944
  reset_joint_max_acc_rad_s2: 3.0
  isaac_max_frames: 900
  target_pose_publish_hz: 30
  target_axis_length: 0.30
  target_axis_radius: 0.010
  rdk_clear_fault: false
  rdk_strict_clear_fault: true
  drdk:
    reset_motion:
      # Avoid Studio's empty-target race when entering NRT_JOINT_POSITION.
      method: "movej"
    output_torque_regulator:
      enabled: true
      # Keep the controller's output-torque saturation below RobotInfo.tau_max.
      # For A3/A4 this changes 64 * 1.3 = 83.2 Nm to 64 * 0.85 = 54.4 Nm.
      limiting_factor: 0.85
      error_threshold: 50
      # The password value is never stored in the repository. Export this
      # variable before start.sh so both simulated robots can be configured.
      password_env: "FLEXIV_SAFETY_PASSWORD"
    cartesian_impedance:
      enabled: true
      # Match the impedance response to the 30 N / 5 Nm contact-wrench limits:
      # 1 cm translation produces about 25 N and 1 degree about 4.36 Nm.
      left_stiffness: [2500.0, 2500.0, 2500.0, 250.0, 250.0, 250.0]
      right_stiffness: [2500.0, 2500.0, 2500.0, 250.0, 250.0, 250.0]
      left_damping_ratio: [0.8, 0.8, 0.8, 0.8, 0.8, 0.8]
      right_damping_ratio: [0.8, 0.8, 0.8, 0.8, 0.8, 0.8]
    self_collision_monitor:
      # Disabled: the official monitor can race a controller fault and issue a
      # second RobotPair.Stop(), terminating the DRDK process. Studio torque
      # protection and the guards below remain active.
      enabled: false
      min_distance_m: 0.15
      loop_interval_ms: 10
      skipped_links: []
    contact_wrench:
      enabled: true
      # [Fx, Fy, Fz, Mx, My, Mz], units [N, Nm].
      left_limit: [30.0, 30.0, 30.0, 5.0, 5.0, 5.0]
      right_limit: [30.0, 30.0, 30.0, 5.0, 5.0, 5.0]
      freeze_trigger_ratio: 0.90
      release_ratio: 0.55
      trigger_samples: 1
      release_dwell_sec: 0.12
    joint_torque:
      enabled: true
      # Compare tau, tau_ext and a short-term torque prediction against
      # RobotPair.info().tau_max. If runtime tau_dot is zero, estimate it from
      # consecutive tau samples so simulation contacts still trigger early.
      trigger_ratio: 0.72
      release_ratio: 0.55
      trigger_samples: 1
      release_dwell_sec: 0.15
      prediction_horizon_sec: 0.025
      # Roll back to the newest target at least this old when protection triggers.
      rollback_sec: 0.05
    target_resampling:
      enabled: true
      # Responsive NRT profile. Quest/Isaac remains 30 Hz; DRDK sends bounded
      # pose/velocity targets at 500 Hz while keeping impact headroom.
      rate_hz: 500.0
      prediction_horizon_sec: 0.012
      velocity_filter_alpha: 0.65
      feedforward_scale: 1.0
      max_linear_feedforward_m_s: 3.0
      max_angular_feedforward_rad_s: 12.0
      torque_soft_ratio: 0.58
      min_motion_scale: 0.20
      linear_velocity_deadband_m_s: 0.005
      angular_velocity_deadband_rad_s: 0.02

convert:
  repo_id: "qiming/isaacsim_flexiv_dual_arm"
  action_mode: "qpos"

validation:
  run_name_prefix: "isaacsim_flexiv_dual_arm"
  probe_timeout_sec: 300
  min_left_q_delta: 0.005
  min_right_q_delta: 0.005
  min_left_torque_norm: 1e-8
  min_right_torque_norm: 1e-8
  min_left_target_frame_delta: 0.01
  min_right_target_frame_delta: 0.01
  min_servo_cycle_delta: 5
  expected_video_fps: 30
  frame_diff_threshold: 0.2
  max_duplicate_frame_ratio: 0.50
  min_mean_frame_diff: 0.03

fake_sender:
  host: "127.0.0.1"
  dual: true
  trajectory_profile: "pick_place_redblock_dual"
  restart_before_record: true
  restart_warmup_sec: 1.0
  amplitude_m: 0.040
  cycles: 12
  frames: 12000
  rate_hz: 30
  quat_wxyz: "1.0,0.0,0.0,0.0"
