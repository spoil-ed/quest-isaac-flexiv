# Stage2 dual-Rizon4 data collection pipeline.
# This references environment and scene configs, then defines only data,
# fake-input, conversion, and validation behavior.

environment_config: "../environments/local_flexiv_runtime.yaml"
scene_config: "../scenes/dual_rizon4_cam_front.yaml"

gateway:
  sample_endpoint: "tcp://127.0.0.1:5790"
  bridge_endpoint: "tcp://127.0.0.1:5791"
  fps: 30
  jpeg_quality: 90
  camera_keys: ["color_0"]

quest_target:
  host: "127.0.0.1"
  port: 57679

target_pose:
  left:
    host: "127.0.0.1"
    port: 57680
  right:
    host: "127.0.0.1"
    port: 57681

rdk_status:
  left: {host: "127.0.0.1", port: 57682}
  right: {host: "127.0.0.1", port: 57683}

record:
  task_name: "quest_isaac_flexiv_stage2_dual_rizon4"
  fps: 30
  image_size: "640x480"
  max_frames: 180
  task_goal: "quest-isaac-flexiv stage2 dual-arm data collection"
  task_desc: "Old Isaac TargetFrame/RDK/Studio loop with dual-arm Unitree JSON recording"

control:
  # SimPlugin/FlexivSimulation state transport stays at the proven 2 kHz rate.
  # User targets and GUI rendering are independently limited to 30 Hz.
  physics_hz: 2000
  render_hz: 30
  # Isaac rendering stays on the selected NVIDIA GPU. Keep PhysX on CPU like
  # Stage1; GPU rigid-body stepping is slower for this small 2 kHz scene.
  gpu_dynamics: false
  quest_position_scale: 1.0
  quest_position_deadband_m: 0.0
  quest_relative_orientation_mode: "relative"
  max_linear_speed_m_s: 0.50
  max_angular_speed_rad_s: 0.75
  # max_frames counts rendered frames; 900 frames is 30 s at 30 Hz.
  isaac_max_frames: 900
  target_pose_publish_hz: 30
  target_axis_length: 0.24
  target_axis_radius: 0.009
  rdk_clear_fault: false
  rdk_strict_clear_fault: true
  rdk_servo_on: false
  rdk_switch_mode: true
  rdk_retry_last_pose_sec: 1.0

convert:
  repo_id: "qiming/quest_isaac_flexiv_stage2_dual_rizon4"
  action_mode: "qpos"

validation:
  run_name_prefix: "quest_isaac_flexiv_stage2_dual_rizon4_real"
  probe_timeout_sec: 300
  min_left_q_delta: 0.005
  min_right_q_delta: 0.005
  min_left_torque_norm: 1e-8
  min_right_torque_norm: 1e-8
  min_left_target_frame_delta: 0.01
  min_right_target_frame_delta: 0.01
  min_servo_cycle_delta: 5
  expected_video_fps: 30
  frame_diff_threshold: 0.2
  max_duplicate_frame_ratio: 0.50
  min_mean_frame_diff: 0.05

fake_sender:
  host: "127.0.0.1"
  dual: true
  axis: "x"
  right_axis: "x"
  amplitude_m: 0.04
  cycles: 30
  frames: 9000
  rate_hz: 30
  quat_wxyz: "1.0,0.0,0.0,0.0"
