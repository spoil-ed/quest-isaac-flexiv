# Stage3 config-driven sim scene validation: stack red/green/yellow blocks.

environment_config: "../environments/local_flexiv_runtime.yaml"
scene_config: "../scenes/stack_rgyblock_flexiv_dual.yaml"

gateway:
  sample_endpoint: "tcp://127.0.0.1:5890"
  bridge_endpoint: "tcp://127.0.0.1:5891"
  fps: 30
  jpeg_quality: 90
  camera_keys: ["color_0"]

quest_target: {host: "127.0.0.1", port: 58679}
target_pose:
  left: {host: "127.0.0.1", port: 58680}
  right: {host: "127.0.0.1", port: 58681}

rdk_status:
  left: {host: "127.0.0.1", port: 58682}
  right: {host: "127.0.0.1", port: 58683}

record:
  task_name: "quest_isaac_flexiv_stage3_stack_rgyblock_dual"
  fps: 30
  image_size: "640x480"
  max_frames: 240
  task_goal: "Stage3 wall-mounted dual Flexiv red/green/yellow block stacking scene"
  task_desc: "Config-driven Isaac multi-block scene with fake dual-arm teleop, Unitree JSON, LeRobot-style conversion, and H264 video"
  task_steps: "load multi-block scene; fake dual-arm stack waypoints; record Unitree JSON; convert; validate MP4"

control:
  # Match the 2 kHz Flexiv SimPlugin loop; rendering/recording stays at 30 Hz.
  physics_hz: 2000
  render_hz: 30
  gpu_dynamics: false
  quest_position_scale: 1.0
  quest_position_deadband_m: 0.0
  quest_relative_orientation_mode: "relative"
  max_linear_speed_m_s: 0.50
  max_angular_speed_rad_s: 0.75
  # max_frames counts rendered frames; 900 frames is 30 s at 30 Hz.
  isaac_max_frames: 900
  target_pose_publish_hz: 30
  target_axis_length: 0.30
  target_axis_radius: 0.010
  rdk_clear_fault: false
  rdk_strict_clear_fault: true
  rdk_servo_on: false
  rdk_switch_mode: true
  rdk_retry_last_pose_sec: 1.0

convert:
  repo_id: "qiming/quest_isaac_flexiv_stage3_stack_rgyblock_dual"
  action_mode: "qpos"

validation:
  run_name_prefix: "quest_isaac_flexiv_stage3_stack_rgyblock_dual_real"
  probe_timeout_sec: 300
  min_left_q_delta: 0.005
  min_right_q_delta: 0.005
  min_left_torque_norm: 1e-8
  min_right_torque_norm: 1e-8
  min_left_target_frame_delta: 0.01
  min_right_target_frame_delta: 0.01
  min_servo_cycle_delta: 5
  expected_video_fps: 30
  frame_diff_threshold: 0.2
  max_duplicate_frame_ratio: 0.50
  min_mean_frame_diff: 0.03

fake_sender:
  host: "127.0.0.1"
  dual: true
  trajectory_profile: "stack_rgyblock_dual"
  restart_before_record: true
  restart_warmup_sec: 1.0
  amplitude_m: 0.035
  cycles: 12
  frames: 12000
  rate_hz: 30
  quat_wxyz: "1.0,0.0,0.0,0.0"
