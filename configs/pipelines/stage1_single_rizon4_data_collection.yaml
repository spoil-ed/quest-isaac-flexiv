# Stage1 single-Rizon4 data collection pipeline.
# This file references environment and scene configs, then defines only the
# data-collection, conversion, fake-input, and validation behavior.

environment_config: "../environments/local_flexiv_runtime.yaml"
scene_config: "../scenes/single_rizon4_cam_front.yaml"

gateway:
  sample_endpoint: "tcp://127.0.0.1:5690"
  bridge_endpoint: "tcp://127.0.0.1:5691"
  fps: 30
  jpeg_quality: 90

target_pose:
  host: "127.0.0.1"
  port: 55678

quest_target:
  host: "127.0.0.1"
  port: 55679

record:
  task_name: "quest_isaac_flexiv_stage1_single_rizon4"
  fps: 30
  image_size: "640x480"
  max_frames: 150
  task_goal: "quest-isaac-flexiv stage1 data collection"
  task_desc: "Old Isaac TargetFrame/RDK/Studio loop with Stage1 Unitree JSON recording"

control:
  physics_hz: 30
  render_hz: 30
  quest_position_scale: 1.0
  quest_position_deadband_m: 0.0
  quest_relative_orientation_mode: "packet"
  max_linear_speed_m_s: 0.08
  max_angular_speed_rad_s: 0.40
  max_joint_speed_rad_s: 4.0
  target_drive_warmup_cycles: 2
  target_drive_required_valid_cycles: 2
  target_drive_scale: 0.10
  isaac_max_frames: 9000
  target_pose_publish_hz: 30
  rdk_target_hz: 30
  target_axis_length: 0.20
  target_axis_radius: 0.008
  rdk_clear_fault: true
  rdk_strict_clear_fault: false
  rdk_servo_on: false
  rdk_switch_mode: true
  rdk_retry_last_pose_sec: 1.0
  max_target_drive_norm: 3000
  max_target_drive_abs: 3000

convert:
  repo_id: "qiming/quest_isaac_flexiv_stage1_single_rizon4"
  action_mode: "qpos"

validation:
  probe_timeout_sec: 300
  min_left_q_delta: 0.005
  min_left_torque_norm: 1e-8
  min_target_frame_delta: 0.01
  expected_video_fps: 30
  frame_diff_threshold: 0.2
  max_duplicate_frame_ratio: 0.50
  min_mean_frame_diff: 0.05

fake_sender:
  host: "127.0.0.1"
  side: "right"
  axis: "x"
  amplitude_m: 0.04
  cycles: 24
  frames: 7200
  rate_hz: 30
  quat_wxyz: "1.0,0.0,0.0,0.0"
