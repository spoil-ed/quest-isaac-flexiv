# Single Rizon4 scene used by Stage1 real validation.
# The camera is part of the Isaac scene configuration, not the data pipeline.

robot:
  serial_number: "Rizon4-VIHhZM"
  joint_group: "ARM_1"
  prim_path: "/World/Flexiv/Rizon4"
  name: "Rizon4"
  end_effector_prim_name: "flange"
  usd: "/data/qiming/isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
  examples_ext: "/data/qiming/isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"

cameras:
  - name: "cam_front"
    resolution: [640, 480]
    fps: 30
    focal_length: 2.5
    position: {x: 1.65, y: 0.0, z: 1.15}
    orientation: {w: 0.53201591, x: 0.46578865, y: 0.46578865, z: 0.53201591}
