# Stage3 task scene: dual-arm pick/place red block.

task:
  name: "pick_place_redblock_flexiv_dual"
  source_task: "../../../unitree/unitree_sim_isaaclab/tasks/g1_tasks/pick_place_redblock_g1_29dof_dex1"
  description: "Wall-mounted dual Flexiv arms over a tabletop with one red block"
  fake_trajectory_profile: "pick_place_redblock_dual"

robots:
  - side: "left"
    serial_number: "Rizon4-VIHhZM"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/LeftRizon4"
    name: "LeftRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: 0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    # Bootstrap at Studio home, then move to the task posture through DRDK NRT joint position.
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q: [-1.84, 1.839, 0.555, 2.03, 2.033, 1.777, 0.0]
    target:
      prim_path: "/World/TargetFrameLeft"
      name: "target_frame_left"
      position: {x: 0.48, y: 0.18, z: 0.56}
      euler_deg: {x: 0.0, y: 0.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 58680}

  - side: "right"
    serial_number: "Rizon4-WE7ssd"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/RightRizon4"
    name: "RightRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: -0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q: [-1.301593, -1.71, -0.646, -1.835, -0.132, 1.924, 0.0]
    target:
      prim_path: "/World/TargetFrameRight"
      name: "target_frame_right"
      position: {x: 0.48, y: -0.18, z: 0.56}
      euler_deg: {x: 0.0, y: 0.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 58681}

cameras:
  - name: "cam_front"
    resolution: [640, 480]
    fps: 30
    focal_length: 2.0
    position: {x: -0.15, y: 0.0, z: 2.75}
    look_at: {x: 0.50, y: 0.0, z: 0.45}
    up: {x: 1.0, y: 0.0, z: 0.0}

scene_objects:
  - name: "work_table_top"
    type: "cuboid"
    prim_path: "/World/Stage3/WorkTableTop"
    # Long table: y length is > 2.5x x width, with a raised tabletop.
    position: {x: 0.50, y: 0.0, z: 0.23}
    size: [0.74, 1.90, 0.06]
    color: [0.18, 0.18, 0.17]
    collision: true
    rigid_body: false
  - name: "red_block"
    type: "cuboid"
    prim_path: "/World/Stage3/RedBlock"
    position: {x: 0.48, y: 0.12, z: 0.305}
    size: [0.06, 0.06, 0.06]
    color: [1.0, 0.0, 0.0]
    mass: 1.0
    collision: true
    rigid_body: true
  - name: "place_pad"
    type: "cuboid"
    prim_path: "/World/Stage3/PlacePad"
    position: {x: 0.62, y: -0.32, z: 0.275}
    size: [0.18, 0.18, 0.02]
    color: [0.08, 0.22, 0.75]
    collision: false
    rigid_body: false
