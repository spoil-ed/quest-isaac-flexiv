# Stage3 task scene: move a red block toward an open drawer.

task:
  name: "pick_redblock_into_drawer_flexiv_dual"
  source_task: "../../../unitree/unitree_sim_isaaclab/tasks/g1_tasks/pick_redblock_into_drawer_g1_29dof_dex1"
  description: "Wall-mounted dual Flexiv arms with red block and drawer cabinet"
  fake_trajectory_profile: "pick_redblock_into_drawer_dual"

robots:
  - side: "left"
    serial_number: "Rizon4-VIHhZM"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/LeftRizon4"
    name: "LeftRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: 0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    # Axis-aligned TCP workspace in Isaac world coordinates, meters.
    workspace:
      enabled: true
      frame: world
      min: {x: 0.20, y: -0.05, z: 0.25}
      max: {x: 0.85, y: 0.65, z: 1.05}
      visualize: true
      color: [0.20, 0.90, 0.35]
      line_width_m: 0.008
    # Bootstrap at Studio home, then move to the task posture through DRDK NRT joint position.
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q_waypoints: []
    initial_q: [-1.64741995, 1.54859907, 0.76728963, 1.87202577, 2.14803061, 1.47715997, 0.63020754]
    target:
      prim_path: "/World/TargetFrameLeft"
      name: "target_frame_left"
      position: {x: 0.61510761, y: 0.30584618, z: 0.80234595}
      euler_deg: {x: 142.74600614, y: 27.68557028, z: 94.99443205}
    target_pose: {host: "127.0.0.1", port: 58680}

  - side: "right"
    serial_number: "Rizon4-WE7ssd"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/RightRizon4"
    name: "RightRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: -0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    # Axis-aligned TCP workspace in Isaac world coordinates, meters.
    workspace:
      enabled: true
      frame: world
      min: {x: 0.20, y: -0.65, z: 0.25}
      max: {x: 0.85, y: 0.05, z: 1.05}
      visualize: true
      color: [0.20, 0.55, 1.00]
      line_width_m: 0.008
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q_waypoints: []
    initial_q: [-1.41133392, -1.47221452, -0.84874996, -1.69582841, -0.32155028, 1.58311903, 0.66627366]
    target:
      prim_path: "/World/TargetFrameRight"
      name: "target_frame_right"
      position: {x: 0.61510761, y: -0.30584618, z: 0.80234595}
      euler_deg: {x: -142.74600614, y: 27.68557028, z: -94.99443205}
    target_pose: {host: "127.0.0.1", port: 58681}

cameras:
  - name: "cam_front"
    resolution: [640, 480]
    fps: 30
    focal_length: 2.0
    position: {x: -0.15, y: 0.0, z: 2.75}
    look_at: {x: 0.50, y: 0.0, z: 0.45}
    up: {x: 1.0, y: 0.0, z: 0.0}

scene_objects:
  - name: "work_table_top"
    type: "cuboid"
    prim_path: "/World/Stage3/WorkTableTop"
    # Long table lowered to keep the bootstrap-to-initq trajectory collision-free.
    position: {x: 0.50, y: 0.0, z: 0.13}
    size: [0.74, 1.90, 0.06]
    color: [0.18, 0.18, 0.17]
    collision: true
    rigid_body: false
    physics_material:
      static_friction: 0.6
      dynamic_friction: 0.5
      restitution: 0.0
      compliant_contact: {stiffness: 20000.0, damping: 250.0, acceleration_spring: false}
  - name: "red_block"
    type: "cuboid"
    prim_path: "/World/Stage3/RedBlock"
    position: {x: 0.42, y: 0.18, z: 0.20}
    size: [0.05, 0.05, 0.05]
    color: [1.0, 0.0, 0.0]
    mass: 3.0
    collision: true
    rigid_body: true
  - name: "drawer_cabinet"
    type: "articulation"
    prim_path: "/World/Stage3/Cabinet"
    usd: "${UNITREE_ASSET_ROOT}/objects/drawers/cabinet_collider.usd"
    position: {x: 0.70, y: -0.35, z: 0.18}
    orientation: {w: 0.70710678, x: 0.0, y: 0.0, z: 0.70710678}
    scale: [0.52, 0.52, 0.52]
    joint_positions:
      door_left_joint: 0.0
      door_right_joint: 0.0
      drawer_bottom_joint: 0.0
      drawer_top_joint: 0.15
