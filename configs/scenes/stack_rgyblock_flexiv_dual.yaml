# Stage3 task scene: stack red/green/yellow blocks.

task:
  name: "stack_rgyblock_flexiv_dual"
  source_task: "../../../unitree/unitree_sim_isaaclab/tasks/g1_tasks/stack_rgyblock_g1_29dof_dex1"
  description: "Wall-mounted dual Flexiv arms with red, green, and yellow blocks"
  fake_trajectory_profile: "stack_rgyblock_dual"

robots:
  - side: "left"
    serial_number: "Rizon4-VIHhZM"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/LeftRizon4"
    name: "LeftRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: 0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    # Bootstrap at Studio home, then move to the task posture through DRDK NRT joint position.
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q_waypoints:
      - [-1.8879, 1.7997, 0.5862, 1.9189, 2.1874, 1.8322, -0.1244]
    initial_q: [-2.76749928, 1.60589571, -0.10185033, 2.13409496, 2.94157208, 1.03397210, -0.20519636]
    target:
      prim_path: "/World/TargetFrameLeft"
      name: "target_frame_left"
      position: {x: 0.75348038, y: 0.20, z: 0.98000}
      euler_deg: {x: 0.0, y: 90.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 58680}

  - side: "right"
    serial_number: "Rizon4-WE7ssd"
    joint_group: "ARM_1"
    prim_path: "/World/Flexiv/RightRizon4"
    name: "RightRizon4"
    end_effector_prim_name: "flange"
    usd: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples/data/flexiv/Rizon4_with_Grav.usd"
    examples_ext: "../../isaac_sim_ws/exts/isaacsim.robot.manipulators.examples"
    position: {x: -0.06, y: -0.20, z: 1.08}
    orientation: {w: 0.70710678, x: 0.0, y: 0.70710678, z: 0.0}
    bootstrap_q: [0.0, -0.698132, 0.0, 1.5708, 0.0, 0.698132, 0.0]
    initial_q_waypoints:
      - [-1.18, -1.7187, -0.6799, -1.7503, -0.1607, 1.9371, -0.0858]
    initial_q: [-0.77857750, -1.41308403, -0.30362110, -1.84063396, -0.63279176, 1.04804090, 1.39382554]
    target:
      prim_path: "/World/TargetFrameRight"
      name: "target_frame_right"
      position: {x: 0.75348038, y: -0.20, z: 0.98000}
      euler_deg: {x: 0.0, y: 90.0, z: 0.0}
    target_pose: {host: "127.0.0.1", port: 58681}

cameras:
  - name: "cam_front"
    resolution: [640, 480]
    fps: 30
    focal_length: 2.0
    position: {x: -0.15, y: 0.0, z: 2.75}
    look_at: {x: 0.50, y: 0.0, z: 0.45}
    up: {x: 1.0, y: 0.0, z: 0.0}

scene_objects:
  - name: "work_table_top"
    type: "cuboid"
    prim_path: "/World/Stage3/WorkTableTop"
    # Long table lowered to keep the bootstrap-to-initq trajectory collision-free.
    position: {x: 0.50, y: 0.0, z: 0.13}
    size: [0.74, 1.90, 0.06]
    color: [0.18, 0.18, 0.17]
    collision: true
    rigid_body: false
    physics_material:
      static_friction: 0.6
      dynamic_friction: 0.5
      restitution: 0.0
      compliant_contact: {stiffness: 20000.0, damping: 250.0, acceleration_spring: false}
  - name: "red_block"
    type: "cuboid"
    prim_path: "/World/Stage3/RedBlock"
    position: {x: 0.40, y: 0.16, z: 0.20}
    size: [0.05, 0.05, 0.05]
    color: [1.0, 0.0, 0.0]
    mass: 1.0
    collision: true
    rigid_body: true
  - name: "yellow_block"
    type: "cuboid"
    prim_path: "/World/Stage3/YellowBlock"
    position: {x: 0.54, y: 0.03, z: 0.20}
    size: [0.05, 0.05, 0.05]
    color: [1.0, 1.0, 0.0]
    mass: 1.0
    collision: true
    rigid_body: true
  - name: "green_block"
    type: "cuboid"
    prim_path: "/World/Stage3/GreenBlock"
    position: {x: 0.43, y: -0.15, z: 0.20}
    size: [0.05, 0.05, 0.05]
    color: [0.0, 1.0, 0.0]
    mass: 1.0
    collision: true
    rigid_body: true
